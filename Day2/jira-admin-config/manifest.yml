modules:
  jira:adminPage:
    - key: admin-main-page
      resource: main
      resolver:
        function: resolver
      title: Admin Dashboard
      render: native
    - key: admin-configure-page
      resource: config
      resolver:
        function: resolver
      title: Configure
      useAsConfig: true
      render: native
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: src/frontend/main.jsx
  - key: config
    path: src/frontend/config.jsx
app:
  runtime:
    name: nodejs22.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/7e1e8c6b-ef11-44a1-8c24-5806355b72d2
permissions:
  scopes:
    - read:jira-work
    - storage:app